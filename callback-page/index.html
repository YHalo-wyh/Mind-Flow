<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindFlow 重设密码</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(17, 24, 39, 0.92);
      --line: #334155;
      --text: #e5e7eb;
      --sub: #cbd5e1;
      --ok: #22c55e;
      --err: #f87171;
      --btn: #10b981;
      --btnText: #052e16;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #1d4ed8 0%, transparent 45%),
                  radial-gradient(900px 500px at 100% 100%, #065f46 0%, transparent 45%),
                  linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 620px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }
    h1 { font-size: 22px; margin: 0 0 10px; }
    p { margin: 8px 0; line-height: 1.6; color: var(--sub); }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
    .row { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    .stack { display: grid; gap: 10px; margin-top: 12px; }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #0b1220;
      color: #dbeafe;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      background: var(--btn);
      color: var(--btnText);
      font-weight: 700;
    }
    .ghost {
      background: transparent;
      color: #93c5fd;
      border: 1px solid var(--line);
    }
    .hidden { display: none; }
    code {
      display: block;
      margin-top: 12px;
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      color: #93c5fd;
      word-break: break-all;
      white-space: pre-wrap;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>MindFlow 重设密码</h1>
    <p id="status">正在解析回调参数...</p>

    <section id="resetSection" class="hidden">
      <p>验证成功，请在此直接设置新密码。提交后会同步到 Supabase（Auth + user_profiles）。</p>
      <div class="stack">
        <input id="newPwd" type="password" placeholder="新密码（至少6位）" />
        <input id="confirmPwd" type="password" placeholder="确认新密码" />
      </div>
      <div class="row">
        <button id="submitResetBtn" type="button">保存新密码并同步</button>
      </div>
    </section>

    <section id="expiredSection" class="hidden">
      <p>重置链接已失效，可在这里重新发送重置邮件。</p>
      <div class="stack">
        <input id="emailInput" type="email" placeholder="输入你的邮箱" />
      </div>
      <div class="row">
        <button id="resendBtn" type="button">重新发送重置邮件</button>
      </div>
    </section>

    <div class="row">
      <button id="copyBtn" class="ghost" type="button">复制回调参数</button>
    </div>
    <code id="payload"></code>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const payloadEl = document.getElementById("payload");
    const copyBtn = document.getElementById("copyBtn");

    const resetSection = document.getElementById("resetSection");
    const expiredSection = document.getElementById("expiredSection");
    const submitResetBtn = document.getElementById("submitResetBtn");
    const resendBtn = document.getElementById("resendBtn");
    const newPwdEl = document.getElementById("newPwd");
    const confirmPwdEl = document.getElementById("confirmPwd");
    const emailInputEl = document.getElementById("emailInput");

    const rawHash = window.location.hash || "";
    const hash = rawHash.startsWith("#") ? rawHash.slice(1) : rawHash;
    const query = window.location.search.startsWith("?") ? window.location.search.slice(1) : "";
    const hashParams = new URLSearchParams(hash);
    const queryParams = new URLSearchParams(query);

    function param(key) {
      return hashParams.get(key) || queryParams.get(key) || "";
    }

    const error = param("error");
    const errorCode = param("error_code");
    const errorDesc = decodeURIComponent(param("error_description") || "");
    const msg = decodeURIComponent(param("msg") || "");
    const accessToken = param("access_token");
    const type = (param("type") || "").toLowerCase();
    const sbParam = param("sb");
    const emailParam = param("email") || queryParams.get("email") || "";

    let resendCooldownUntil = 0;
    let resendCooldownTimer = null;

    payloadEl.textContent = [query, hash].filter(Boolean).join("\n# ") || "(空)";

    function resolveSupabaseUrl() {
      if (window.MF_SUPABASE_URL) return window.MF_SUPABASE_URL;
      if (!sbParam) return "";
      if (sbParam.startsWith("http://") || sbParam.startsWith("https://")) {
        return sbParam.replace(/\/$/, "");
      }
      if (/^[a-z0-9-]+$/i.test(sbParam)) {
        return "https://" + sbParam + ".supabase.co";
      }
      return "";
    }

    const SUPABASE_URL = resolveSupabaseUrl() || "https://hbycbtlboclqhkqznsea.supabase.co";
    const SUPABASE_ANON_KEY = window.MF_SUPABASE_ANON_KEY || "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhieWNidGxib2NscWhrcXpuc2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTMwNzQsImV4cCI6MjA4OTIyOTA3NH0.OBTy__XH3tlc9xgL5mzYRDdwjYkXqIl-WTzqaNnFEyA";

    function ensureConfig() {
      if (!SUPABASE_ANON_KEY) {
        statusEl.className = "err";
        statusEl.textContent = "缺少 Supabase anon key。请在页面注入 window.MF_SUPABASE_ANON_KEY。";
        return false;
      }
      return true;
    }

    function parseJsonSafe(text) {
      try {
        return JSON.parse(text || "{}");
      } catch (_) {
        return {};
      }
    }

    function decodeJwtPayload(token) {
      try {
        if (!token || token.split(".").length < 2) return {};
        const payload = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
        const pad = payload.length % 4 === 0 ? "" : "=".repeat(4 - (payload.length % 4));
        return JSON.parse(atob(payload + pad));
      } catch (_) {
        return {};
      }
    }

    function parseRetrySeconds(resp, responseText) {
      const retryAfter = resp && resp.headers ? resp.headers.get("retry-after") : null;
      if (retryAfter && /^\d+$/.test(retryAfter.trim())) {
        return Number(retryAfter.trim());
      }

      const text = (responseText || "") + " " + msg;
      const en = text.match(/after\s+(\d+)\s+seconds?/i);
      if (en) return Number(en[1]);
      const zh = text.match(/(\d+)\s*秒/);
      if (zh) return Number(zh[1]);
      return 35;
    }

    function setResendCooldown(seconds) {
      const sec = Math.max(1, Number(seconds) || 35);
      resendCooldownUntil = Date.now() + sec * 1000;

      if (resendCooldownTimer) {
        clearInterval(resendCooldownTimer);
      }

      function tickCooldown() {
        const left = Math.ceil((resendCooldownUntil - Date.now()) / 1000);
        if (left <= 0) {
          resendBtn.disabled = false;
          resendBtn.textContent = "重新发送重置邮件";
          if (resendCooldownTimer) {
            clearInterval(resendCooldownTimer);
            resendCooldownTimer = null;
          }
          return;
        }
        resendBtn.disabled = true;
        resendBtn.textContent = "请等待 " + left + " 秒";
      }

      tickCooldown();
      resendCooldownTimer = setInterval(tickCooldown, 1000);
    }

    async function updatePasswordAndSync(newPassword) {
      if (!ensureConfig()) return;
      if (!accessToken) {
        statusEl.className = "err";
        statusEl.textContent = "缺少 access_token，无法重设密码。";
        return;
      }

      statusEl.textContent = "正在更新密码...";
      const resetResp = await fetch(SUPABASE_URL + "/auth/v1/user", {
        method: "PUT",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + accessToken,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ password: newPassword })
      });

      const resetText = await resetResp.text();
      if (!resetResp.ok) {
        const resetErr = parseJsonSafe(resetText);
        const resetCode = String(resetErr.error_code || resetErr.code || "").toLowerCase();
        const resetMsg = String(resetErr.msg || resetErr.error_description || resetText || "");
        if (resetResp.status === 401 || resetResp.status === 403 || resetCode.includes("expired") || resetCode.includes("invalid") || resetCode.includes("access_denied")) {
          statusEl.className = "err";
          statusEl.textContent = "重设凭证已失效，请重新发送重置邮件。";
          resetSection.classList.add("hidden");
          expiredSection.classList.remove("hidden");
          return;
        }
        statusEl.className = "err";
        statusEl.textContent = "密码更新失败：" + resetMsg;
        return;
      }

      statusEl.textContent = "密码已更新，正在同步 user_profiles...";

      const userResp = await fetch(SUPABASE_URL + "/auth/v1/user", {
        method: "GET",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + accessToken
        }
      });
      const userText = await userResp.text();
      if (!userResp.ok) {
        statusEl.className = "err";
        statusEl.textContent = "读取用户信息失败：" + userText;
        return;
      }

      let user;
      try {
        user = JSON.parse(userText);
      } catch (_) {
        statusEl.className = "err";
        statusEl.textContent = "读取用户信息失败：返回格式异常";
        return;
      }

      const email = user.email || "";
      const id = user.id || "";
      const username = email.includes("@") ? email.split("@")[0] : "user";

      const profileResp = await fetch(SUPABASE_URL + "/rest/v1/user_profiles?on_conflict=id", {
        method: "POST",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + accessToken,
          "Content-Type": "application/json",
          "Prefer": "resolution=merge-duplicates,return=minimal"
        },
        body: JSON.stringify({ id, email, username })
      });

      if (!profileResp.ok) {
        const t = await profileResp.text();
        statusEl.className = "err";
        statusEl.textContent = "密码已重设，但同步 user_profiles 失败：" + t;
        return;
      }

      statusEl.className = "ok";
      statusEl.textContent = "密码重设成功，数据库同步完成。现在可以返回 App 直接登录。";
      resetSection.classList.add("hidden");
    }

    async function resendRecoveryEmail(email) {
      if (!ensureConfig()) return;
      if (!email) {
        statusEl.className = "err";
        statusEl.textContent = "请先输入邮箱。";
        return;
      }

      statusEl.textContent = "正在校验用户...";
      const verifyResp = await fetch(
        SUPABASE_URL + "/rest/v1/user_profiles?email=eq." + encodeURIComponent(email) + "&select=id&limit=1",
        {
          method: "GET",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Content-Type": "application/json"
          }
        }
      );

      if (!verifyResp.ok) {
        statusEl.className = "err";
        statusEl.textContent = "暂时无法验证用户是否存在，请稍后再试。";
        return;
      }

      const verifyText = await verifyResp.text();
      let verifyRows = [];
      try {
        verifyRows = JSON.parse(verifyText || "[]");
      } catch (_) {
        verifyRows = [];
      }

      if (!Array.isArray(verifyRows) || verifyRows.length === 0) {
        statusEl.className = "err";
        statusEl.textContent = "该用户不存在，请先注册。";
        return;
      }

      statusEl.textContent = "正在发送重置邮件...";
      const resp = await fetch(SUPABASE_URL + "/auth/v1/recover", {
        method: "POST",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email })
      });

      const text = await resp.text();
      if (!resp.ok) {
        if (resp.status === 429) {
          const retrySec = parseRetrySeconds(resp, text);
          setResendCooldown(retrySec);
          statusEl.className = "err";
          statusEl.textContent = "发送过于频繁，请在 " + retrySec + " 秒后重试。";
          return;
        }
        statusEl.className = "err";
        statusEl.textContent = "发送失败：" + text;
        return;
      }

      statusEl.className = "ok";
      statusEl.textContent = "重置邮件已重新发送，请查收最新邮件链接。";
    }

    if (error || errorCode) {
      statusEl.className = "err";
      const displayCode = (errorCode || error || "unknown").toLowerCase();
      const suffix = errorDesc || msg;
      statusEl.textContent = "回调失败：" + displayCode + (suffix ? " (" + suffix + ")" : "");
      if (displayCode === "otp_expired" || displayCode === "over_email_send_rate_limit") {
        expiredSection.classList.remove("hidden");
        if (displayCode === "over_email_send_rate_limit") {
          setResendCooldown(parseRetrySeconds(null, ""));
        }
      }
    } else if (type === "recovery" && accessToken) {
      statusEl.className = "ok";
      statusEl.textContent = "验证通过，请在下方设置新密码并同步。";
      resetSection.classList.remove("hidden");
    } else {
      statusEl.className = "err";
      statusEl.textContent = "这不是有效的重设密码回调。";
    }

    submitResetBtn.addEventListener("click", async () => {
      const p1 = (newPwdEl.value || "").trim();
      const p2 = (confirmPwdEl.value || "").trim();
      if (p1.length < 6) {
        statusEl.className = "err";
        statusEl.textContent = "新密码至少 6 位。";
        return;
      }
      if (p1 !== p2) {
        statusEl.className = "err";
        statusEl.textContent = "两次密码不一致。";
        return;
      }
      submitResetBtn.disabled = true;
      try {
        await updatePasswordAndSync(p1);
      } finally {
        submitResetBtn.disabled = false;
      }
    });

    resendBtn.addEventListener("click", async () => {
      if (Date.now() < resendCooldownUntil) {
        return;
      }
      resendBtn.disabled = true;
      try {
        const email = (emailInputEl.value || "").trim();
        if (email) {
          try {
            localStorage.setItem("mf_recovery_email", email);
          } catch (_) {}
        }
        await resendRecoveryEmail(email);
      } finally {
        if (Date.now() >= resendCooldownUntil) {
          resendBtn.disabled = false;
        }
      }
    });

    (function initEmailInput() {
      let saved = "";
      try {
        saved = localStorage.getItem("mf_recovery_email") || "";
      } catch (_) {}
      const jwtPayload = decodeJwtPayload(accessToken);
      const jwtEmail = typeof jwtPayload.email === "string" ? jwtPayload.email : "";
      emailInputEl.value = emailParam || jwtEmail || saved;
    })();

    copyBtn.addEventListener("click", async () => {
      try {
        const raw = [query, hash].filter(Boolean).join("\n# ");
        await navigator.clipboard.writeText(raw || "");
        copyBtn.textContent = "已复制";
        setTimeout(() => copyBtn.textContent = "复制回调参数", 1200);
      } catch (_) {
        copyBtn.textContent = "复制失败";
      }
    });
  </script>
</body>
</html>
